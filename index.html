<!DOCTYPE html>
<html>
<head>
  <title>JS Canvas Animation</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<canvas id="myCanvas"></canvas>

<script>
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");

// full screen canvas
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ball object
let ball = {
  x: 100,
  y: 100,
  dx: 4,
  dy: 3,
  radius: 20
};

function animate() {
  // clear screen
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
  ctx.closePath();

  // movement
  ball.x += ball.dx;
  ball.y += ball.dy;

  // bounce off walls
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
    ball.dx *= -1;
  }

  if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
    ball.dy *= -1;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
